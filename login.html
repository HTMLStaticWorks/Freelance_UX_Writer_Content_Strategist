<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | UXWriter Portal</title>
    
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/img/favicon.png">
    <style>
        .auth-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at top right, rgba(99, 102, 241, 0.1), transparent);
            padding-top: 100px !important;
            padding-bottom: 40px !important;
        }
        .auth-card {
            width: 100%;
            max-width: 650px;
        }
    </style>
</head>
<body>

    <div class="auth-wrapper p-4 position-relative">
        <!-- Top Right Toggles -->
        <div class="position-absolute top-0 end-0 p-4 d-flex gap-3" style="z-index: 10;">
            <div class="theme-toggle shadow-sm" id="themeToggle" title="Toggle Dark/Light Mode">
                <i class="fas fa-moon"></i>
            </div>
            <div class="rtl-toggle shadow-sm" id="rtlToggle" title="Toggle LTR/RTL">
                RTL
            </div>
        </div>

        <div class="auth-card glass-card p-4 p-md-5 reveal">
            <div class="text-center mb-5 w-100">
                <a class="navbar-brand d-flex align-items-center justify-content-center mb-3" href="index.html">
                    <i class="fas fa-feather-pointed text-accent me-2"></i>
                    <span class="text-accent">UX</span>Writer.
                </a>
                <h2 class="h4">Welcome Back</h2>
                <p class="text-muted">Login to access your project dashboard.</p>
            </div>
            
            <form action="dashboard.html" class="needs-validation text-start w-100" novalidate>
                <div class="mb-4">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-control" placeholder="" required>
                </div>
                <div class="mb-4">
                    <label class="form-label">Password</label>
                    <div class="position-relative">
                        <input type="password" class="form-control pe-5" id="loginPassword" required>
                        <i class="far fa-eye position-absolute top-50 end-0 translate-middle-y me-3 text-muted password-toggle" style="cursor: pointer;" onclick="togglePassword('loginPassword', this)"></i>
                    </div>
                    <div class="d-flex justify-content-between align-items-center mt-2">
                        <div class="form-check mb-0">
                            <input class="form-check-input" type="checkbox" id="rememberMe">
                            <label class="form-check-label text-muted hover-highlight" for="rememberMe" style="font-size: 0.9rem; cursor: pointer;">
                                Remember me
                            </label>
                        </div>
                        <a href="#" class="text-accent hover-highlight" style="font-size: 0.9rem;">Forgot password?</a>
                    </div>
                </div>
                <button type="submit" class="btn-premium btn-premium-primary w-100 mb-4">Login</button>
                
                <div class="text-center mb-4">
                    <span class="text-muted small">Or login with</span>
                </div>
                
                <div class="row g-3">
                    <div class="col-12 col-sm-6">
                        <button type="button" class="btn btn-outline-secondary w-100 d-flex align-items-center justify-content-center">
                            <svg width="18" height="18" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" class="me-2">
                                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                            </svg>
                            Google
                        </button>
                    </div>
                    <div class="col-12 col-sm-6">
                        <button type="button" class="btn btn-outline-secondary w-100"><i class="fab fa-apple me-2" style="color: var(--text-main);"></i> Apple</button>
                    </div>
                </div>
            </form>
            
            <p class="text-center mt-5 mb-0">Don't have an account? <a href="register.html" class="text-accent fw-bold hover-highlight">Sign Up</a></p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
    <script>
        function togglePassword(inputId, icon) {
            const input = document.getElementById(inputId);
            if (input.type === "password") {
                input.type = "text";
                icon.classList.remove("fa-eye");
                icon.classList.add("fa-eye-slash");
            } else {
                input.type = "password";
                icon.classList.remove("fa-eye-slash");
                icon.classList.add("fa-eye");
            }
        }
    </script>
</body>
</html>
